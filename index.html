<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .issue-card {
        transition: all 0.3s ease;
      }
      .issue-card:hover {
        transform: translateY(-5px);
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC] min-h-screen font-sans text-gray-800">
    <div
      id="login-page"
      class="flex items-center justify-center min-h-screen px-4"
    >
      <div
        class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100"
      >
        <div class="text-center">
          <img
            src="/assets/github-logo.png"
            alt="Logo"
            class="w-16 mx-auto mb-4"
          />
          <h1 class="text-2xl font-bold text-gray-800">
            GitHub Issues Tracker
          </h1>
          <p class="text-gray-500 text-sm mb-8">
            Sign in to manage your issues
          </p>
        </div>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1"
              >Username</label
            >
            <input
              type="text"
              id="username"
              placeholder="Enter Username"
              class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
            />
            <p class="text-[11px] text-indigo-600 mt-1">Default: admin</p>
          </div>
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1"
              >Password</label
            >
            <input
              type="password"
              id="password"
              placeholder="Enter Password"
              class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none"
            />
            <p class="text-[11px] text-indigo-600 mt-1">Default: admin123</p>
          </div>
          <button
            onclick="handleLogin()"
            class="w-full bg-[#4F46E5] text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-100"
          >
            Sign In
          </button>
        </div>
        <div class="mt-8 pt-6 border-t border-gray-100 text-center">
          <p class="text-xs font-bold text-gray-400 mb-4 tracking-widest">OR</p>
          <div
            class="bg-gray-50 p-4 rounded-xl border border-dashed border-gray-300"
          >
            <p class="text-sm font-bold text-gray-600 mb-1">
              Demo Credentials:
            </p>
            <p class="text-sm text-gray-500">
              Username: admin | Password: admin123
            </p>
          </div>
        </div>
      </div>
    </div>

    <div id="main-page" class="hidden">
      <nav class="bg-white border-b border-gray-200 sticky top-0 z-10">
        <div
          class="max-w-7xl mx-auto px-4 h-16 flex justify-between items-center"
        >
          <div class="flex items-center gap-2">
            <img src="/assets/github-logo.png" class="w-8" alt="Logo" />
            <span class="font-bold text-lg text-gray-800 hidden md:block"
              >GitHub Issues Tracker</span
            >
          </div>
          <div class="flex gap-2">
            <input
              type="text"
              id="searchInput"
              placeholder="Search issues..."
              class="bg-gray-100 border-none p-2 px-4 rounded-full text-sm focus:ring-2 focus:ring-indigo-500 outline-none w-40 md:w-64"
            />
            <button
              onclick="handleSearch()"
              class="bg-[#4F46E5] text-white px-4 py-2 rounded-full text-xs font-bold"
            >
              Search
            </button>
          </div>
        </div>
      </nav>

      <main class="max-w-7xl mx-auto p-4 md:p-8">
        <div class="flex justify-center gap-3 mb-8">
          <button
            onclick="filterIssues('all', this)"
            class="tab-btn bg-[#4F46E5] text-white px-8 py-2 rounded-lg font-medium shadow-md"
          >
            All
          </button>
          <button
            onclick="filterIssues('open', this)"
            class="tab-btn bg-white border border-gray-200 text-gray-600 px-8 py-2 rounded-lg font-medium"
          >
            Open
          </button>
          <button
            onclick="filterIssues('closed', this)"
            class="tab-btn bg-white border border-gray-200 text-gray-600 px-8 py-2 rounded-lg font-medium"
          >
            Closed
          </button>
        </div>

        <div
          class="bg-white p-5 rounded-t-2xl border border-gray-200 flex justify-between items-center"
        >
          <div class="flex items-center gap-4">
            <div class="bg-indigo-50 p-3 rounded-xl text-indigo-600 font-bold">
              <img src="/assets/Aperture.png" alt="" />
            </div>
            <div>
              <h2 id="issueCount" class="font-extrabold text-xl text-gray-800">
                0 Issues
              </h2>
              <p class="text-xs text-gray-400">
                Track and manage your project issues
              </p>
            </div>
          </div>
          <div class="flex gap-4 text-xs font-semibold">
            <span class="flex items-center gap-1"
              ><span class="w-3 h-3 bg-green-500 rounded-full"></span>
              Open</span
            >
            <span class="flex items-center gap-1"
              ><span class="w-3 h-3 bg-purple-500 rounded-full"></span>
              Closed</span
            >
          </div>
        </div>

        <div id="loader" class="hidden text-center py-20">
          <div
            class="animate-spin rounded-full h-10 w-10 border-4 border-indigo-200 border-t-indigo-600 mx-auto"
          ></div>
        </div>

        <div
          id="issuesContainer"
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mt-4"
        ></div>
      </main>
    </div>

    <div
      id="issueModal"
      class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50"
    >
      <div
        class="bg-white rounded-3xl max-w-2xl w-full overflow-hidden shadow-2xl p-8 relative"
      >
        <h2
          id="modalTitle"
          class="text-3xl font-extrabold text-[#1F2937] mb-3"
        ></h2>
        <div class="flex items-center gap-3 mb-6">
          <span id="modalStatusBadge"></span>
          <span id="modalSubInfo" class="text-sm text-gray-400"></span>
        </div>
        <div class="flex gap-2 mb-8">
          <span
            class="bg-[#FFF1F1] text-[#EB5757] border border-[#FFDEDE] px-3 py-1 rounded-full text-xs font-bold"
          >
            BUG</span
          >
          <span
            class="bg-[#FFF8E1] text-[#F2994A] border border-[#FFE8B3] px-3 py-1 rounded-full text-xs font-bold"
          >
            HELP WANTED</span
          >
        </div>
        <p
          id="modalDesc"
          class="text-[#6B7280] text-lg leading-relaxed mb-10"
        ></p>
        <div
          class="bg-[#F9FAFB] p-6 rounded-2xl grid grid-cols-2 gap-4 mb-8 border border-gray-100"
        >
          <div>
            <p class="text-gray-400 text-sm mb-1 font-medium">Assignee:</p>
            <p id="modalAuthor" class="text-xl font-bold text-[#1F2937]"></p>
          </div>
          <div>
            <p class="text-gray-400 text-sm mb-1 font-medium">Priority:</p>
            <span
              id="modalPriority"
              class="px-4 py-1 rounded-full text-white text-[10px] font-bold"
            ></span>
          </div>
        </div>
        <div class="flex justify-end">
          <button
            onclick="closeModal()"
            class="bg-[#4F46E5] hover:bg-indigo-700 text-white px-10 py-3 rounded-xl font-bold transition-all shadow-lg shadow-indigo-100"
          >
            Close
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
